<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>laszi's</title>
	<meta name="viewport" content="width=device-width">
	<style>
    :root {
      color-scheme: dark light;
    }

		html, body {
			position: relative;
			height: 100%;
			margin: 0;
			padding: 0;
      background-color: rgb(20,20,20);
      color: rgb(255, 255, 255);
		}

    * {
      -webkit-text-fill-color: inherit !important;
      -webkit-background-clip: padding-box !important;
      background-clip: padding-box !important;
    }

    @media (prefers-color-scheme: dark), (prefers-color-scheme: light) {
    html, body {
        background-color: rgb(20,20,20) !important;
        color: rgb(255,255,255) !important;
      }
    } 

		main {
			position: relative;
			top: 40%;
			transform: translateY(-50%);
			text-align: center;
		}

    .card-wrapper {
  position: relative;
  display: inline-block;
}

    .card {
  position: relative;
  z-index: 10;
  background: rgb(20,20,20);
  border-radius: 8px;
  padding: 1rem;
  transition: transform 0.5s ease, background 0.5s ease;
}

    .paper {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 40px;
  width: 150px;
  padding: 12px;
  background: rgba(255, 240, 206, 0.802);
  color: rgb(255, 255, 255);
  font-weight: bold;
  border-radius: 6px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  opacity: 0;
  z-index: 1;
  transition: top 0.5s ease, opacity 0.5s ease;
}

    .card-wrapper:hover .card {
  transform: scale(1.1) rotateZ(2deg);
  background: linear-gradient(145deg, rgb(0,0,0), rgb(55,55,55));
  animation: glowPulse 5s infinite;
}

    .card-wrapper:hover .paper {
  top: 97%;
  opacity: 1;
}

    @keyframes glowPulse {
      0% {
          box-shadow: 0 0 10px rgba(255,30,30,0.3), 0 0 20px rgba(255,0,0,0.1);
      }
      50% {
          box-shadow: 0 0 20px rgba(255,30,30,0.9), 0 0 40px rgba(255,0,0,0.5);
      }
      100% {
          box-shadow: 0 0 10px rgba(255,30,30,0.3), 0 0 20px rgba(255,0,0,0.1);
      }
    }
 
		h1 {
			margin: 0;
			display: inline;
		}

		a {
      position: relative;
      text-decoration: none;
      color: inherit
    }

    a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      left: 0;
      bottom: -2px;
      background-color: #ccc;
      transition: width 0.3s ease;
    }

    a:hover::after {
      width: 100%;
    }
	</style>
</head>
<body>
	<main>
		<div class="card-wrapper">
    <div class="paper">Welcome to my website!</div>

    <div class="card">
        <h1>Vegh Latsi</h1> 
        <br>
        <a href="https://instagram.com/laszi_">instagram.com/laszi_</a>
        <br>
        <a href="https://www.snapchat.com/@lasziiii">snapchat.com/@lasziiii</a>
    </div>
</div>
	</main>
</body>
</html>
